name: Entas4 Bulk Capture to Google Drive

on:
  schedule:
    # 매일 10:30 KST = 01:30 UTC
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  bulk-capture-entas4:
    runs-on: ubuntu-latest

    env:
      CAPTURE_BASE_URL: http://localhost:3001
      NODE_ENV: production
      GDRIVE_SERVICE_ACCOUNT_KEY: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}
      DAILY_SCREENSHOT_FOLDER_ID: '1M8s8vE85v_MUAupxMpKYSSRUG2z0fXlc'
      ENTAS4_TEST_MODE: '1'
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: afg-dashboard/package-lock.json

      - name: Install dependencies
        working-directory: ./afg-dashboard
        run: npm ci

      - name: Ensure TypeScript is installed
        working-directory: ./afg-dashboard
        run: |
          if ! npx --yes typescript --version >/dev/null 2>&1; then
            npm install typescript --no-save
          fi

      - name: Build Next.js app
        working-directory: ./afg-dashboard
        run: npm run build

      - name: Start Next.js server
        working-directory: ./afg-dashboard
        run: |
          nohup npm run start -- -p 3001 > .next-server.log 2>&1 &
          echo $! > .next-server.pid

      - name: Wait for server to be ready
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:3001 > /dev/null; then
              echo "Server is up"
              exit 0
            fi
            echo "Waiting for server... ($i)"
            sleep 5
          done
          echo "Server did not become ready in time"
          exit 1
        working-directory: ./afg-dashboard

      - name: Run Entas4 bulk capture to Google Drive
        working-directory: ./afg-dashboard
        run: node scripts/bulk-capture-entas4-gdrive.js

      - name: Stop Next.js server
        if: always()
        working-directory: ./afg-dashboard
        run: |
          if [ -f .next-server.pid ]; then
            kill "$(cat .next-server.pid)" || true
          fi

