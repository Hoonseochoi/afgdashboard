name: Entas4 Bulk Capture to Google Drive

on:
  schedule:
    # 월~금 10:30 KST = 01:30 UTC, 주말 제외
    - cron: '30 1 * * 1-5'
    # 백업: 10:35 KST (GitHub가 10:30 실행을 누락할 수 있어 5분 뒤 한 번 더)
    - cron: '35 1 * * 1-5'
  workflow_dispatch:

# 동시 실행 방지: 10:30과 10:35 둘 다 트리거돼도 한 번에 하나만 실행. 새 실행이 들어오면 진행 중인 run은 취소됨.
concurrency:
  group: bulk-capture-entas4-daily
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bulk-capture-entas4:
    runs-on: ubuntu-latest

    env:
      CAPTURE_BASE_URL: http://localhost:3001
      NODE_ENV: production
      GDRIVE_SERVICE_ACCOUNT_KEY: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}
      DAILY_SCREENSHOT_FOLDER_ID: '1M8s8vE85v_MUAupxMpKYSSRUG2z0fXlc'
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
      GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
      GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
      
      # 👇 새롭게 추가된 푸시 알림 환경 변수들 (GitHub Secrets에서 불러옴) 👇
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
      PUSH_API_SECRET: ${{ secrets.PUSH_API_SECRET }}
      # Next.js 코드 내에서 `VAPID_PUBLIC_KEY` 라는 이름으로 찾을 경우를 대비한 백업
      VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }} 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: afg-dashboard/package-lock.json

      - name: Install dependencies
        working-directory: ./afg-dashboard
        env:
          NODE_ENV: development
          NPM_CONFIG_PRODUCTION: "false"
        run: npm ci --include=dev

      - name: Ensure TypeScript is installed
        working-directory: ./afg-dashboard
        run: |
          if ! npx --yes typescript --version >/dev/null 2>&1; then
            npm install typescript --no-save
          fi

      - name: Build Next.js app
        working-directory: ./afg-dashboard
        run: npm run build

      - name: Start Next.js server
        working-directory: ./afg-dashboard
        run: |
          nohup npm run start -- -p 3001 > .next-server.log 2>&1 &
          echo $! > .next-server.pid

      - name: Wait for server to be ready
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:3001 > /dev/null; then
              echo "Server is up"
              exit 0
            fi
            echo "Waiting for server... ($i)"
            sleep 5
          done
          echo "Server did not become ready in time"
          exit 1
        working-directory: ./afg-dashboard

      - name: Run Entas4 bulk capture to Google Drive
        working-directory: ./afg-dashboard
        run: node scripts/bulk-capture-entas4-gdrive.js

      - name: Stop Next.js server
        if: always()
        working-directory: ./afg-dashboard
        run: |
          if [ -f .next-server.pid ]; then
            kill "$(cat .next-server.pid)" || true
          fi